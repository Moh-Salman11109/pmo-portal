name: pmo-portal-frontend

# Build-only pipeline (workflow_dispatch only) — standard fleet shape.
# Promotion across uat / preprod / prod is handled out-of-band by n8n.
on:
  workflow_dispatch:

jobs:
  build:
    uses: TreeDigitalInsurance/tree-platform-workflows/.github/workflows/build-node.yml@v0
    with:
      service_name: pmo-portal
      gitops_area: frontend
      gcp_region: me-central2
      artifact_registry_repo: artifact-app-bus-fe
      artifact_registry_image: img-fe-pmo-portal
      node_version: "20"
      sonar_project_key: TreeDigitalInsurance_pmo-portal-frontend
      sonar_organization: treedigitalinsurance
      sonar_host_url: https://sonarcloud.io
    secrets: inherit
    permissions:
      contents: read
      id-token: write
