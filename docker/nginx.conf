# nginx server for the PMO Portal SPA (non-root, port 8080).
server {
    listen       8080;
    listen       [::]:8080;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # gzip for text assets.
    gzip              on;
    gzip_vary         on;
    gzip_min_length   1024;
    gzip_proxied      any;
    gzip_types        text/plain text/css application/javascript application/json image/svg+xml;

    # Security headers (ported from staticwebapp.config.json / web.config).
    add_header X-Content-Type-Options  "nosniff"                        always;
    add_header X-Frame-Options         "SAMEORIGIN"                     always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection        "1; mode=block"                  always;

    # Kubernetes liveness/readiness probe target — cheap, no logging.
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # Runtime config + index.html must never be cached, so a redeploy or a
    # config change is picked up immediately.
    location = /config.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    # Content-hashed build assets are immutable — cache them hard.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        try_files $uri =404;
    }

    # SPA fallback: unknown routes serve index.html for client-side routing.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
